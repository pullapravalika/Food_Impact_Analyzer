<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="topbar">
<h1>Food Impact Analyzer</h1>
</header>

<section class="dashboard">

<h2>Welcome Back 👋</h2>

<div class="summary">

<div class="card">
<h3>Calories</h3>
<p id="calories"></p>
</div>

<div class="card">
<h3>Health Score</h3>
<p id="healthScore"></p>
</div>

</div>

<div class="circle-section">

<div class="circle-card">
<h4>Healthy Streak</h4>
<div class="circle green" id="healthyCircle">0</div>
</div>

<div class="circle-card">
<h4>Junk Streak</h4>
<div class="circle red" id="junkCircle">0</div>
</div>

</div>

<div class="water">

<h3>Water Suggestion 💧</h3>
<div class="water-bar">
<div id="waterFill"></div>
</div>

</div>

<div class="suggestions">
<h3>Suggestions</h3>
<p id="suggestions"></p>
</div>

</section>

<script src="/js/script.js"></script>

</body>
</html>
