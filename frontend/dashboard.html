<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
<h1>Food Impact Analyzer</h1>
</header>

<section class="dashboard">

<h2>Today's Summary</h2>

<div class="dashboard-grid">

<!-- Calories -->
<div class="card">
<h3>Total Calories</h3>
<p id="calories">0</p>
</div>

<!-- Healthy -->
<div class="card">
<h3>Healthy</h3>
<div class="circle green" id="healthy">0</div>
</div>

<!-- Junk -->
<div class="card">
<h3>Junk</h3>
<div class="circle red" id="junk">0</div>
</div>

<!-- Water -->
<div class="card">
<h3>💧 Water Intake</h3>
<div class="water-bar">
<div id="waterFill" style="width:0%; height:100%; background:blue;"></div>
</div>
</div>

</div>


<!-- Chart -->
<div class="card" style="margin-top:30px;">
<h3>Weekly Report</h3>
<canvas id="myChart"></canvas>
</div>


<!-- Suggestions -->
<div class="card" style="margin-top:30px;">
<h3>Suggestions</h3>
<p id="suggestions"></p>
</div>


<!-- Delivery -->
<div class="card" style="margin-top:30px;">
<h3>Order Status 🚚</h3>
<p id="orderStatus">Preparing...</p>
</div>


</section>

<script>

window.onload = function(){

let email = localStorage.getItem("userEmail")

if(!email){
alert("Login required ❌")
window.location.href="/login_page"
return
}

// ==========================
// FETCH DASHBOARD DATA
// ==========================

let userId = localStorage.getItem("userId")

fetch(`/dashboard_data/${userId}`)
.then(res => res.json())
.then(data => {

document.getElementById("calories").innerText = data.calories
document.getElementById("healthy").innerText = data.healthy
document.getElementById("junk").innerText = data.junk

})

// Water suggestion
let water = Math.min(100, data.calories / 20)
document.getElementById("waterFill").style.width = water + "%"

// Suggestions
let suggestion = data.junk > data.healthy 
? "⚠️ Try eating more healthy food!"
: "✅ Great job! Keep maintaining healthy diet!"

document.getElementById("suggestions").innerText = suggestion

// Order status
document.getElementById("orderStatus").innerText = "Delivered ✅"

// Chart
const ctx = document.getElementById('myChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Healthy', 'Junk'],
datasets: [{
label: 'Food Count',
data: [data.healthy, data.junk]
}]
}
})

})
.catch(err=>{
console.error(err)
alert("Dashboard load failed ❌")
})

}

</script>

</body>
</html>
