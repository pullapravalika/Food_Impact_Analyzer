<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="topbar">

<h1>Food Impact Analyzer</h1>

<nav>
<a href="/restaurants.html">Order Food</a>
<a href="/">Logout</a>
</nav>

</header>


<section class="dashboard">

<h2>Today's Summary</h2>

<div class="dashboard-grid">

<div class="dashboard-card">

<h3>Total Calories</h3>

<p id="calorieTotal">0</p>

</div>


<div class="dashboard-card">

<h3>Healthy Streak</h3>

<p id="healthyStreak">0</p>

</div>


<div class="dashboard-card">

<h3>Junk Streak</h3>

<p id="junkStreak">0</p>

</div>

</div>



<h2>Water Intake Suggestion</h2>

<p id="waterSuggestion"></p>



<h2>Weekly Food Report</h2>

<p>Healthy Foods: <span id="healthyDays"></span></p>
<p>Junk Foods: <span id="junkDays"></span></p>



<h2>Order History</h2>

<ul id="orderHistory"></ul>

</section>


<script src="/js/script.js"></script>

</body>

</html>
