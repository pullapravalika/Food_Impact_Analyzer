<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="dashboard-container">

<div class="dashboard-header">

<h2>Food Impact Analyzer</h2>

</div>

<h3>Welcome Back, <span id="userName">User</span>!</h3>

<h4>Your Health Overview</h4>


<div class="card">

<h4>Today's Summary</h4>

<div class="summary-grid">

<div class="circle-progress">

<div class="circle">

<span id="calorieTotal">0</span>

<p>Calories</p>

</div>

</div>

<div class="health-score">

<h3>Health Score</h3>

<h1 id="healthScore">0</h1>

<span class="score-label">Good</span>

</div>

</div>

</div>


<div class="card">

<div class="streak-grid">

<div class="streak-box junk">

<h4>🍔 Junk Food</h4>

<p id="junkCount">0</p>

</div>

<div class="streak-box healthy">

<h4>✔ Healthy Streak</h4>

<p id="healthyStreak">0 Days</p>

</div>

<div class="streak-box danger">

<h4>⚠ Junk Streak</h4>

<p id="junkStreak">0 Days</p>

</div>

</div>

</div>


<div class="card">

<h4>💧 Water Intake</h4>

<div class="water-bar">

<div id="waterProgress"></div>

</div>

<p id="waterSuggestion"></p>

</div>


<div class="card">

<h4>This Week's Report</h4>

<div class="weekly-bars">

<div class="bar green" id="healthyBar"></div>

<div class="bar red" id="junkBar"></div>

</div>

<p>Healthy Days: <span id="healthyDays">0</span></p>

<p>Junk Days: <span id="junkDays">0</span></p>

</div>

</div>

<script src="/js/script.js"></script>

</body>

</html>
