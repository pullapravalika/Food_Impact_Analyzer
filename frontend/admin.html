<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin - Complaints</h2>

<div id="complaints"></div>

<script>

function loadComplaints() {
    fetch("http://127.0.0.1:5000/get_complaints")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.forEach(c => {
            html += `
                <div style="border:1px solid black; padding:10px; margin:10px;">
                    <p><b>Email:</b> ${c.email}</p>
                    <p><b>Issue:</b> ${c.issue}</p>
                    <p><b>Description:</b> ${c.description}</p>
                    <p><b>Status:</b> ${c.status}</p>

                    <input id="reply_${c.id}" placeholder="Reply here">
                    <button onclick="reply(${c.id})">Reply</button>
                </div>
            `;
        });

        document.getElementById("complaints").innerHTML = html;
    });
}

function reply(id) {
    const replyText = document.getElementById(`reply_${id}`).value;

    fetch("http://127.0.0.1:5000/update_complaint", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            status: "Resolved",
            reply: replyText
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadComplaints();
    });
}

loadComplaints();

</script>

</body>
</html>
