<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Input - Food Impact Analyzer</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Food Impact Analyzer</h1>
</header>

<section class="food-container">

    <h2>Enter Food Details</h2>

    <form>

        <div class="input-group">
            <label>Food Name</label>
            <input type="text" placeholder="Enter food item (e.g., Pizza)" required>
        </div>

        <div class="input-group">
            <label>Meal Type</label>

            <select required>
                <option value="">Select Meal</option>
                <option>Breakfast</option>
                <option>Lunch</option>
                <option>Dinner</option>
                <option>Snack</option>
            </select>

        </div>

        <div class="input-group">
            <label>Quantity</label>
            <input type="number" placeholder="Enter quantity" required>
        </div>

        <button type="submit">Analyze Food</button>

    </form>

</section>

<footer>
    <p>© 2026 Food Impact Analyzer</p>
</footer>
<script src="js/script.js"></script>

</body>

</html>
