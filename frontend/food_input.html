<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Input - Food Impact Analyzer</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Food Impact Analyzer</h1>
</header>

<section class="food-container">

<h2>Enter Food Details</h2>

<form id="foodForm">

<div class="input-group">
<label for="foodName">Food Name</label>
<input type="text" id="foodName" placeholder="Enter food item (e.g., Pizza)" required>
</div>

<div class="input-group">
<label for="mealType">Meal Type</label>

<select id="mealType">
<option value="">Select Meal</option>
<option value="Breakfast">Breakfast</option>
<option value="Lunch">Lunch</option>
<option value="Dinner">Dinner</option>
<option value="Snack">Snack</option>
</select>

</div>

<div class="input-group">
<label for="quantity">Quantity</label>
<input type="number" id="quantity" placeholder="Enter quantity">
</div>

<button type="submit">Analyze Food</button>

</form>

</section>

<footer>
<p>© 2026 Food Impact Analyzer</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
