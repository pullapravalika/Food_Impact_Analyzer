<!DOCTYPE html>
<html>
<head>
<title>Restaurants</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar">
<h1>Food Impact Analyzer</h1>

<input type="text" id="search" placeholder="Search restaurants..." onkeyup="searchRestaurant()">

<a href="cart.html">🛒 Cart</a>

</header>

<div class="restaurant-grid">

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<h3>Pizza Hub</h3>
<p>⭐ 4.4 • 25 mins</p>
<button onclick="openMenu('pizza')">View Menu</button>
</div>

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>Burger Point</h3>
<p>⭐ 4.2 • 20 mins</p>
<button onclick="openMenu('burger')">View Menu</button>
</div>

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1589308078059-be1415eab4c3">
<h3>South Indian Tiffins</h3>
<p>⭐ 4.6 • 15 mins</p>
<button onclick="openMenu('idli')">View Menu</button>
</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
