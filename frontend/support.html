<!DOCTYPE html>
<html>
<head>
<title>Support</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="topbar">
<h1>Food Impact Analyzer</h1>
</header>

<section style="padding:40px; text-align:center;">

<h2>Customer Support</h2>

<select id="issueType">
<option>Wrong Order</option>
<option>Late Delivery</option>
<option>Payment Issue</option>
<option>Other</option>
</select>

<br><br>

<textarea id="description" placeholder="Describe your issue"></textarea>

<br><br>

<button onclick="submitIssue()">Submit</button>

</section>

<script>

function submitIssue(){

let email = localStorage.getItem("userEmail")
let issue = document.getElementById("issueType").value
let description = document.getElementById("description").value

fetch("/submit_issue",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email, issue, description })
})
.then(res => res.json())
.then(data=>{
alert("Issue submitted successfully ✅")
})

}

</script>

</body>
</html>
