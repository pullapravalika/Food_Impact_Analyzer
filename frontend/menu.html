<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="topbar">
<h1 id="restaurantTitle">Menu</h1>

<nav>
<a href="/restaurants_page">Restaurants</a>
<a href="/cart_page">Cart</a>
<a href="/dashboard_page">Dashboard</a>
</nav>
</header>

<section class="food-container">

<h2>Available Items</h2>

<div id="menuContainer" class="restaurant-grid"></div>

</section>

<script>

// 🔥 GET SELECTED RESTAURANT
const restaurant = localStorage.getItem("restaurant");

// Show restaurant name
document.getElementById("restaurantTitle").innerText = restaurant.toUpperCase() + " Menu";


// 🔥 MENU DATA
const menus = {

    "pizza_hut": [
        {name: "Margherita Pizza", price: 200},
        {name: "Veg Supreme", price: 300}
    ],

    "burger_king": [
        {name: "Veg Burger", price: 120},
        {name: "Chicken Burger", price: 180}
    ],

    "green_bowl": [
        {name: "Salad Bowl", price: 150},
        {name: "Healthy Wrap", price: 130}
    ],

    "south_india": [
        {name: "Idli", price: 50},
        {name: "Dosa", price: 80}
    ]
};


// 🔥 LOAD MENU
const menuItems = menus[restaurant];
const container = document.getElementById("menuContainer");

menuItems.forEach(item => {

    container.innerHTML += `
        <div class="restaurant-card">
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
            <button onclick="addToCart('${item.name}', ${item.price})">
                Add to Cart
            </button>
        </div>
    `;
});


// 🔥 ADD TO CART FUNCTION
function addToCart(name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({name, price});

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart!");
}

</script>

</body>
</html>
